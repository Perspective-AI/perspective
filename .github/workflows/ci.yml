name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Format
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Test SSR
        run: pnpm test:ssr

      - name: Test types
        run: pnpm test:types

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Key on the lockfile so the cache tracks the resolved Playwright version.
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # System deps (apt) install cleanly on their own — kept separate from the
      # browser download, which previously stalled after the Chromium binary
      # finished. Each download attempt is killed if it stalls and retried on a
      # fresh connection; cached/already-fetched browsers make retries no-ops.
      - name: Install Playwright system deps
        run: pnpm --filter @perspective-ai/sdk exec playwright install-deps chromium

      - name: Install Playwright browsers
        run: |
          for i in 1 2 3; do
            timeout 240 pnpm --filter @perspective-ai/sdk exec playwright install chromium && exit 0
            echo "::warning::playwright browser download attempt $i stalled or failed; retrying"
          done
          exit 1

      - name: Test E2E
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/sdk/playwright-report/
          retention-days: 30
